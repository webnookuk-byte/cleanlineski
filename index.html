<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clean Line Ski — Coming Soon</title>
  <meta name="description" content="Small-group, guided ski trips to Verbier and Val d'Isère for serious skiers. Launching soon." />
  <meta name="robots" content="noindex" />

  <!-- Fonts -->
  <link rel="stylesheet" href="/css/fonts.css" />

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #111111;
      --blue:       #1666A8;
      --blue-dark:  #0D4F85;
      --blue-light: #9fd4ff;
      --mid:        #6B6B6B;
      --border:     #2a2a2a;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d0d0d;
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      text-align: center;
    }

    .logo {
      margin-bottom: 3rem;
    }

    .logo img {
      height: 56px;
      width: auto;
    }

    .label {
      display: inline-block;
      font-family: 'Raleway', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--blue-light);
      margin-bottom: 1.25rem;
    }

    h1 {
      font-family: 'Raleway', sans-serif;
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 1.5rem;
    }

    .sub {
      font-size: 1.05rem;
      font-weight: 300;
      color: rgba(255,255,255,0.65);
      line-height: 1.7;
      max-width: 480px;
      margin: 0 auto 2.5rem;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--blue);
      margin: 0 auto 2.5rem;
    }

    .contact-line {
      font-size: 0.85rem;
      font-weight: 400;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.6rem;
    }

    .email-link {
      display: inline-block;
      font-family: 'Raleway', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--blue-light);
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: color 0.2s;
    }

    .email-link:hover {
      color: #fff;
    }

    footer {
      position: relative;
      z-index: 1;
      padding: 1.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>

  <main>

    <div class="logo">
      <img src="/images/footer_logo.webp" alt="Clean Line Ski" />
    </div>

    <span class="label">Coming Soon</span>

    <h1>Good Skiing Is<br />Hard to Find.</h1>

    <div class="divider"></div>

    <p class="sub">Small groups. Early starts. Proper terrain. We're putting the finishing touches on something worth waiting for — check back soon.</p>

    <p class="contact-line">In the meantime, get in touch:</p>
    <a href="mailto:info@cleanlineski.co.uk" class="email-link">info@cleanlineski.co.uk</a>

  </main>

  <footer>
    &copy; 2026 Clean Line Ski. All rights reserved.
  </footer>

</body>
</html>
